# Iperparametri baseline PPO (tutte le best practice attive)
env_id: "ALE/SpaceInvaders-v5"
seed: 42
total_timesteps: 10000000
num_envs: 8
num_steps: 128
num_minibatches: 4
update_epochs: 4
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.1
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
learning_rate: 0.00025
lr_decay: true

reward_norm: true
frame_stack: true
orthogonal_init: true

track: true
wandb_project: "dlai-spaceinvaders-ppo"
capture_video: false
video_interval: 1000000
